{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static '/src/output.css' %}" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{% static 'bookingapp/asset/site-logo.svg' %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inria+Serif:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=La+Belle+Aurore&family=Medula+One&family=Odor+Mean+Chey&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Racing+Sans+One&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sora:wght@100..800&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    
    <title>Register | TourEdu</title>

    <style>
        .poppins-regular {
            font-family: "Poppins", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        .bg-image {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
        }

        .bg-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('{% static 'bookingapp/images/csucc-front.svg' %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.1;
            z-index: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .form-input {
            background: rgba(255, 255, 255, 0.9);
            border: 1.5px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .form-input:hover {
            border-color: #cbd5e0;
        }

        .gradient-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .gradient-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .gradient-btn:hover::after {
            left: 100%;
        }

        .social-btn {
            border: 1.5px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            border-color: #667eea;
            transform: translateY(-1px);
        }

        .floating-label {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            transition: all 0.3s ease;
            pointer-events: none;
            color: #718096;
        }

        .input-container {
            position: relative;
        }

        .input-container input:focus + .floating-label,
        .input-container input:not(:placeholder-shown) + .floating-label {
            top: -10px;
            left: 8px;
            font-size: 12px;
            color: #667eea;
            background: white;
            padding: 0 4px;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #718096;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .animated-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, #667eea, #764ba2, #f093fb, #f5576c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
            opacity: 0.1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        .logo-glow {
            filter: drop-shadow(0 0 10px rgba(255, 204, 0, 0.5));
        }

        .header-bg {
            background: rgba(9, 55, 4, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="poppins-regular ease-in-out">

    <div class="animated-bg"></div>
    <div class="bg-image relative min-h-screen flex flex-col">

        <header class="w-full header-bg h-[79px] flex items-center">
            <div class="max-w-screen-2xl w-full mx-auto">
                <div class="flex justify-between w-full items-center px-6 md:px-10">
                    <div class="flex items-center gap-3">
                        <img src="{% static 'bookingapp/images/logo-csucc.svg' %}" alt="CSUCC Logo" class="h-12 logo-glow">
                        <span class="text-white font-semibold text-lg hidden md:block">TourEdu</span>
                    </div>
                    <div class="flex gap-3 md:gap-5">
                        <a href="#" class="py-2 px-4 md:px-8 bg-gradient-to-r from-[#FFCC00] to-[#FFD700] hover:from-[#FFD700] hover:to-[#FFCC00] cursor-pointer rounded-lg font-medium transition-all duration-300 hover:scale-105 shadow-lg">
                            Register
                        </a>
                        <a href="#" class="py-2 px-4 md:px-8 border-2 border-white/50 text-white rounded-lg font-medium hover:bg-white/10 cursor-pointer transition-all duration-300 backdrop-blur-sm">
                            Contact Us
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 flex items-center justify-center p-4 md:p-6">
            <div class="w-full max-w-4xl mx-auto">
                <div class="flex flex-col lg:flex-row gap-8 items-center">
                    <!-- Left side - Brand/Info -->
                    

                    <!-- Right side - Register Form -->
                    <div class="lg:w-1/2 w-full">
                        <form method="POST" class="w-full">
                            {% csrf_token %}
                            <div class="glass-card rounded-2xl p-8 w-full">
                                <div class="text-center mb-8">
                                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Create Account</h2>
                                    <p class="text-gray-600">Join thousands of tourism professionals</p>
                                </div>

                                {% if messages %}
                                <div class="mb-6">
                                    {% for message in messages %}
                                    <div class="p-4 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm">
                                        {{ message }}
                                    </div>
                                    {% endfor %}
                                </div>
                                {% endif %}

                                <div class="space-y-5">
                                    <!-- Name Row -->
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div class="md:col-span-2">
                                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                                First Name
                                            </label>
                                            <div class="relative">
                                                <input type="text" name="first_name" placeholder="John" required
                                                    class="form-input w-full px-4 py-3 rounded-lg focus:outline-none">
                                                <div class="absolute right-3 top-1/2 transform -translate-y-1/2">
                                                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                                    </svg>
                                                </div>
                                            </div>
                                        </div>
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                                M.I.
                                            </label>
                                            <input type="text" name="middle_initial" placeholder="A"
                                                class="form-input w-full px-4 py-3 rounded-lg text-center focus:outline-none">
                                        </div>
                                    </div>

                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">
                                            Last Name
                                        </label>
                                        <div class="relative">
                                            <input type="text" name="last_name" placeholder="Doe" required
                                                class="form-input w-full px-4 py-3 rounded-lg focus:outline-none">
                                            <div class="absolute right-3 top-1/2 transform -translate-y-1/2">
                                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                                </svg>
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">
                                            Email Address
                                        </label>
                                        <div class="relative">
                                            <input type="email" name="email" placeholder="john.doe@example.com" required
                                                class="form-input w-full px-4 py-3 rounded-lg focus:outline-none">
                                            <div class="absolute right-3 top-1/2 transform -translate-y-1/2">
                                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                                </svg>
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">
                                            Phone Number
                                        </label>
                                        <div class="relative">
                                            <input type="tel" name="phone" placeholder="+63 912 345 6789" required
                                                class="form-input w-full px-4 py-3 rounded-lg focus:outline-none">
                                            <div class="absolute right-3 top-1/2 transform -translate-y-1/2">
                                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                                                </svg>
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">
                                            Password
                                        </label>
                                        <div class="relative">
                                            <input type="password" name="password" id="password" placeholder="••••••••" required
                                                class="form-input w-full px-4 py-3 rounded-lg focus:outline-none">
                                            <button type="button" onclick="togglePassword('password')" class="password-toggle">
                                                <svg id="eye-icon-password" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                                </svg>
                                            </button>
                                        </div>
                                    </div>

                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">
                                            Confirm Password
                                        </label>
                                        <div class="relative">
                                            <input type="password" name="confirm_password" id="confirm_password" placeholder="••••••••" required
                                                class="form-input w-full px-4 py-3 rounded-lg focus:outline-none">
                                            <button type="button" onclick="togglePassword('confirm_password')" class="password-toggle">
                                                <svg id="eye-icon-confirm" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                                </svg>
                                            </button>
                                        </div>
                                    </div>

                                    <div class="flex items-center">
                                        <input type="checkbox" id="terms" name="terms" required
                                            class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                                        <label for="terms" class="ml-2 text-sm text-gray-600">
                                            I agree to the <a href="#" class="text-blue-600 hover:underline">Terms & Conditions</a> and <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>
                                        </label>
                                    </div>

                                    <button type="submit" class="gradient-btn w-full text-white py-3.5 px-4 rounded-lg font-semibold text-lg">
                                        Create Account
                                    </button>

                                    <div class="text-center mt-6">
                                        <p class="text-gray-600">
                                            Already have an account? 
                                            <a href="{% url 'bookingapp:login' %}" class="text-blue-600 font-semibold hover:underline">
                                                Sign in here
                                            </a>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const eyeIcon = document.getElementById(`eye-icon-${fieldId === 'password' ? 'password' : 'confirm'}`);
            
            if (field.type === 'password') {
                field.type = 'text';
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L6.59 6.59m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
            } else {
                field.type = 'password';
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
            }
        }

        // Add focus effects to inputs
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('ring-2', 'ring-blue-500');
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('ring-2', 'ring-blue-500');
            });
        });

        // Form validation
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = document.getElementById('password');
            const confirmPassword = document.getElementById('confirm_password');
            
            if (password.value !== confirmPassword.value) {
                e.preventDefault();
                alert('Passwords do not match!');
                password.focus();
            }
        });
    </script>

</body>
</html>
