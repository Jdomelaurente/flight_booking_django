{% extends 'instructorapp/base.html' %}
{% block title %}Item Analysis{% endblock %}
{% load static %}
{% block content %}

<div class="w-full mx-auto p-6 font-sans">


    <h1 class="text-3xl font-bold text-gray-800 mb-6">Item Analysis Dashboard</h1>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <div class="bg-white shadow rounded-lg p-4">
            <div class="text-gray-500 text-sm">Total Items</div>
            <div class="text-2xl font-semibold text-gray-800" id="totalItems">5</div>
        </div>
        <div class="bg-white shadow rounded-lg p-4">
            <div class="text-gray-500 text-sm">Average Difficulty</div>
            <div class="text-2xl font-semibold text-gray-800" id="avgDifficulty">—</div>
        </div>
        <div class="bg-white shadow rounded-lg p-4">
            <div class="text-gray-500 text-sm">Average Discrimination</div>
            <div class="text-2xl font-semibold text-gray-800" id="avgDiscrimination">—</div>
        </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-col md:flex-row gap-4 mb-4">
        <input type="text" id="searchInput" placeholder="Search items..." class="p-2 border border-gray-300 rounded-lg flex-1">
        <select id="sortSelect" class="p-2 border border-gray-300 rounded-lg">
            <option value="difficulty">Sort by Difficulty</option>
            <option value="discrimination">Sort by Discrimination</option>
            <option value="correct">Sort by Correct %</option>
            <option value="name">Sort by Name</option>
        </select>
    </div>

    <!-- Chart -->
    <div class="bg-white shadow rounded-lg p-4 mb-6">
        <canvas id="analysisChart" height="50"></canvas>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto bg-white shadow rounded-lg">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-blue-600 text-white">
                <tr>
                    <th class="px-6 py-3 text-left text-sm font-medium">Item</th>
                    <th class="px-6 py-3 text-left text-sm font-medium">Difficulty Index</th>
                    <th class="px-6 py-3 text-left text-sm font-medium">Discrimination Index</th>
                    <th class="px-6 py-3 text-left text-sm font-medium">Correct %</th>
                    <th class="px-6 py-3 text-left text-sm font-medium">Total Responses</th>
                </tr>
            </thead>
            <tbody id="tableBody" class="bg-white divide-y divide-gray-200"></tbody>
        </table>
    </div>
</div>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const dummyData = [
    { id: 1, name: 'Question 1', difficulty: 0.75, discrimination: 0.68, correct: 85, total: 100 },
    { id: 2, name: 'Question 2', difficulty: 0.45, discrimination: 0.52, correct: 45, total: 100 },
    { id: 3, name: 'Question 3', difficulty: 0.90, discrimination: 0.71, correct: 90, total: 100 },
    { id: 4, name: 'Question 4', difficulty: 0.30, discrimination: 0.44, correct: 30, total: 100 },
    { id: 5, name: 'Question 5', difficulty: 0.60, discrimination: 0.59, correct: 60, total: 100 },
];

let currentData = [...dummyData];
let chartInstance = null;

function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    data.forEach(item => {
        const difficultyBar = `
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="h-2 rounded-full ${getDifficultyClass(item.difficulty)}" style="width:${item.difficulty*100}%"></div>
            </div>
        `;

        const discriminationBar = `
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="h-2 rounded-full bg-blue-500" style="width:${item.discrimination*100}%"></div>
            </div>
        `;

        const row = `
            <tr class="hover:bg-gray-50">
                <td class="px-6 py-4">${item.name}</td>
                <td class="px-6 py-4">
                    <div class="font-semibold text-sm mb-1">${(item.difficulty*100).toFixed(0)}%</div>
                    ${difficultyBar}
                </td>
                <td class="px-6 py-4">
                    <div class="font-semibold text-sm mb-1">${(item.discrimination*100).toFixed(0)}%</div>
                    ${discriminationBar}
                </td>
                <td class="px-6 py-4">${(item.correct/item.total*100).toFixed(0)}%</td>
                <td class="px-6 py-4">${item.total}</td>
            </tr>
        `;
        tbody.innerHTML += row;
    });

    // Update summary cards
    document.getElementById('totalItems').textContent = data.length;
    document.getElementById('avgDifficulty').textContent = ((data.reduce((a,b)=>a+b.difficulty,0)/data.length)*100).toFixed(0)+'%';
    document.getElementById('avgDiscrimination').textContent = ((data.reduce((a,b)=>a+b.discrimination,0)/data.length)*100).toFixed(0)+'%';

    renderChart(data);
}

function getDifficultyClass(difficulty) {
    if(difficulty>0.70) return 'bg-red-500';
    if(difficulty>0.40) return 'bg-yellow-500';
    return 'bg-green-500';
}

// Chart rendering
function renderChart(data) {
    const ctx = document.getElementById('analysisChart').getContext('2d');
    const labels = data.map(d => d.name);
    const difficultyData = data.map(d => (d.difficulty*100).toFixed(0));
    const discriminationData = data.map(d => (d.discrimination*100).toFixed(0));
    const correctData = data.map(d => ((d.correct/d.total*100).toFixed(0)));

    if(chartInstance) chartInstance.destroy(); // remove old chart

    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Difficulty %', data: difficultyData, backgroundColor: 'rgba(220,53,69,0.7)' },
                { label: 'Discrimination %', data: discriminationData, backgroundColor: 'rgba(0,123,255,0.7)' },
                { label: 'Correct %', data: correctData, backgroundColor: 'rgba(40,167,69,0.7)' }
            ]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero:true, max: 100 }
            }
        }
    });
}

// Filters
document.getElementById('searchInput').addEventListener('input', e=>{
    const filtered = dummyData.filter(item=>item.name.toLowerCase().includes(e.target.value.toLowerCase()));
    currentData = filtered;
    renderTable(currentData);
});

document.getElementById('sortSelect').addEventListener('change', e=>{
    const sortBy = e.target.value;
    currentData.sort((a,b)=>{
        if(sortBy==='difficulty') return b.difficulty - a.difficulty;
        if(sortBy==='discrimination') return b.discrimination - a.discrimination;
        if(sortBy==='correct') return (b.correct/b.total) - (a.correct/a.total);
        return a.name.localeCompare(b.name);
    });
    renderTable(currentData);
});

renderTable(currentData);
</script>

{% endblock %}
