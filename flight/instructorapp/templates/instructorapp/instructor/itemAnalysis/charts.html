<!-- =========================
         CHARTS
========================== -->
<div class="charts-row">
<!-- PASS / FAIL DONUT -->
    <div class="chart-card">
        <div class="chart-header">
            <h2>Pass/Fail Distribution</h2>
        </div>
        <div class="donut-container">
            <div class="donut-chart" id="donutChart" style="--pass:0; --fail:0;"></div>
            <div class="donut-legend">
                <div class="legend-item"><span class="legend-color pass"></span> <span id="donutPassLabel">Pass (0%)</span></div>
                <div class="legend-item"><span class="legend-color fail"></span> <span id="donutFailLabel">Fail (0%)</span></div>
            </div>
        </div>
    </div>

    <!-- ITEM-LEVEL PERFORMANCE BAR CHART -->
    <div class="chart-card-2">
        <div class="chart-header">
            <h2>Item-Level Performance</h2>
        </div>
        <div class="bar-container">
            <div class="bar-row">
                <span class="bar-label">Passenger Information</span>
                <div class="bar" id="barPassenger" style="--width:0;"></div>
                <span class="bar-value" id="barPassengerValue">0</span>
            </div>
            <div class="bar-row">
                <span class="bar-label">Correct departure date</span>
                <div class="bar" id="barDeparture" style="--width:0;"></div>
                <span class="bar-value" id="barDepartureValue">0</span>
            </div>
            <div class="bar-row">
                <span class="bar-label">Correct return date</span>
                <div class="bar" id="barReturn" style="--width:0;"></div>
                <span class="bar-value" id="barReturnValue">0</span>
            </div>
        </div>
    </div>
</div>

<script>

/* UPDATE DONUT CHART */
function updateDonutChart(passingCount, failingCount) {
    const total = passingCount + failingCount;
    const passPercent = total ? Math.round((passingCount / total) * 100) : 0;
    const failPercent = total ? Math.round((failingCount / total) * 100) : 0;

    const donut = document.getElementById("donutChart");
    donut.style.setProperty("--pass", passPercent);
    donut.style.setProperty("--fail", failPercent);

    document.getElementById("donutPassLabel").textContent = `Pass (${passPercent}%)`;
    document.getElementById("donutFailLabel").textContent = `Fail (${failPercent}%)`;
}

/* UPDATE BAR CHART */
function updateBarChart(itemStats) {
    document.getElementById("barPassenger").style.setProperty("--width", itemStats.passenger);
    document.getElementById("barPassengerValue").textContent = itemStats.passenger;

    document.getElementById("barDeparture").style.setProperty("--width", itemStats.departure);
    document.getElementById("barDepartureValue").textContent = itemStats.departure;

    document.getElementById("barReturn").style.setProperty("--width", itemStats.return);
    document.getElementById("barReturnValue").textContent = itemStats.return;
}

</script>
