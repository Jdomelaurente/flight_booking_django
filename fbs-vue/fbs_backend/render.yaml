services:
  - type: web
    name: fbs-backend
    runtime: python
    repo: https://github.com/Jdomelaurente/flight_booking_django.git
    branch: main
    rootDir: fbs-vue/fbs_backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn fbs_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: fbs_backend.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.vercel.app"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,https://*.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "http://localhost:5173,https://*.vercel.app"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: FRONTEND_URL
        value: "https://fbs-frontend.vercel.app"
      - key: WEBSITE_URL
        value: "https://fbs-frontend.vercel.app"
      - key: DATABASE_URL
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: PAYMONGO_SECRET_KEY
        sync: false
      - key: PAYMONGO_PUBLIC_KEY
        sync: false
      - key: PAYMONGO_USERNAME
        sync: false
      - key: PAYMONGO_PASSWORD
        sync: false
